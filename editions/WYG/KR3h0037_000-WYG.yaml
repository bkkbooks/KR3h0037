body:
  text: 畫鑒藝術類一書畫之屬提要臣等謹案畫鑒一卷舊本題宋東楚湯垕君載撰案卷末有題詞曰采真子妙於考古在京師時與今鑒畫博士柯君敬仲論畫遂著此書用意精到悉有依據云云則垕與柯九思同時九思為鑒畫博士在元文宗天厯元年則作此書時上距宋亡已五十三年下距元亡僅三十九年垕安得復稱宋人且書中稱元曰本朝稱宋曰宋朝内元外宋尤不得以遺民藉口舊本蓋相沿誤題也又題詞稱惜乎尚多疏畧乃為刪補編次成帙名曰畫鑒後有高識知賞其言采真子東楚湯垕君載之自號也云云則此書乃因垕舊稿重為潤色不但非垕之原本併畫鑒之名亦非垕所自命矣惟題詞不著名氏遂不能詳考其人耳所論厯代之畫始於吴曹弗興次晉衛協顧愷之次六朝陸探微諸家案吳晉皆在六朝之數不應别探微以下為六朝原本標目如是姑仍其舊而附訂其誤於此次唐及五代諸家次宋金元諸家然元惟龔開陳琳二人盖趙孟頫諸人並出同時故不録也次為外國畫次為雜論大致似米芾畫史以鑒别真偽為主凡所辨論皆在筆墨氣韻間不似董逌諸家以考証見長也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:cf1d65c041c09fe81870d870b2da9cf79883e7c4b0572a7ecb8e2c76945c598b
