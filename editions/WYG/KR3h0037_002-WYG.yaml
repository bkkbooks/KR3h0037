body:
  text: 畫鑑題詞采真子妙於考古在京師時與今鑑畫博士柯君敬仲論畫遂著此書用意精到悉有據依惜乎尚多疏畧乃為删補編次成袠名曰畫鑒後有高識賞其知言采真子東楚湯垕君載之自號也
